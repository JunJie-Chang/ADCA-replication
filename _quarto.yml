project:
  type: book
  output-dir: docs

book:
  title: "Are Choice Experiments Incentive Compatible?"
  subtitle: "A Replication of Lusk & Schroeder (2004) in R"
  author: "Jun-Jie (Justin) Chang · B12607021"
  date: "2026-06-12"
  output-file: "ADCA-replication-Lusk-Schroeder-2004"
  reader-mode: true
  search: true
  repo-url: https://github.com/JunJie-Chang/ADCA-replication
  repo-actions: [source, issue]
  page-footer:
    left: "Replication of Lusk & Schroeder (2004), AJAE 86(2): 467–482."
    right: "Built with [Quarto](https://quarto.org)."
  sidebar:
    style: docked
    collapse-level: 1
  chapters:
    - index.qmd
    - 01-original-study.qmd
    - 02-data.qmd
    - 03-descriptives.qmd
    - 04-mnl.qmd
    - 05-iia.qmd
    - 06-advanced-models.qmd
    - 07-wtp-figure.qmd
    - 08-discrepancies.qmd
    - 09-reproducibility.qmd

format:
  html:
    theme:
      - cosmo
    html-math-method: katex
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-overflow: wrap
    fig-width: 9
    fig-height: 7
    df-print: kable
  pdf:
    documentclass: scrreprt
    pdf-engine: xelatex
    monofont: "Menlo"
    geometry: margin=1in
    toc: true
    toc-depth: 3
    number-sections: true
    fig-width: 8
    fig-height: 6.5
    code-overflow: wrap

execute:
  warning: false
  message: false
  echo: true
  freeze: auto

knitr:
  opts_chunk:
    comment: "#>"
    collapse: true
